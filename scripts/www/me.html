<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg: #F5F5F7;
    --surface: #FFFFFF;
    --text-primary: #1D1D1F;
    --text-secondary: #86868B;
    --text-muted: #AEAEB2;
    --brand: #2dc89c;

    --blue: #007AFF;
    --blue-bg: rgba(0,122,255,0.08);
    --orange: #FF9500;
    --orange-bg: rgba(255,149,0,0.08);
    --green: #34C759;
    --green-bg: rgba(52,199,89,0.08);
    --pink: #FF2D55;
    --pink-bg: rgba(255,45,85,0.08);
    --gray: #8E8E93;
    --gray-bg: rgba(142,142,147,0.08);

    --sp-2: 8px;   --sp-3: 12px;  --sp-4: 16px;
    --sp-5: 20px;  --sp-6: 24px;  --sp-8: 32px;

    --text-sm: 13px;  --text-base: 15px;  --text-lg: 17px;
    --text-xl: 20px; --text-2xl: 28px;

    --radius: 16px;
    --radius-lg: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 14px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    max-width: 100%;
  }

  .page-wrapper { width: 100%; }
  .content {
    padding: var(--sp-4);
    padding-top: 52px;
    padding-bottom: calc(100px + 68px);
  }

  /* Status Bar */
  .status-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    height: 44px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
  }
  .status-time { font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; gap: 5px; }
  .status-icons svg { width: 17px; height: 17px; }

  /* User Card */
  .user-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: var(--sp-5);
    display: flex;
    align-items: center;
    margin-bottom: var(--sp-5);
    cursor: pointer;
	margin-top: 10px;
  }
  .user-card:active { opacity: 0.9; }
  .user-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    margin-right: var(--sp-4);
    overflow: hidden;
    flex-shrink: 0;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; }
  .user-name {
    font-size: var(--text-xl);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .user-meta {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
  }
  .user-role {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: var(--text-sm);
    font-weight: 600;
    background: linear-gradient(135deg, #FF9500, #FF6B00);
    color: white;
  }
  .user-id {
    font-size: var(--text-sm);
    color: var(--text-muted);
    font-family: 'SF Mono', monospace;
  }
  .user-arrow {
    width: 20px;
    height: 20px;
    color: var(--text-muted);
  }

  /* Feature Rows */
  .feature-row {
    display: flex;
    gap: var(--sp-3);
    margin-bottom: var(--sp-3);
  }

  /* Main Feature Card (Left, larger) */
  .feature-main {
    flex: 1.6;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: var(--sp-5);
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: transform 0.15s ease;
  }
  .feature-main:active { transform: scale(0.98); }

  .feature-main .icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: var(--sp-4);
    flex-shrink: 0;
  }
  .feature-main .icon svg { width: 26px; height: 26px; }

  .feature-main .info { flex: 1; min-width: 0; }
  .feature-main .title {
    font-size: var(--text-lg);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .feature-main .stats {
    font-size: var(--text-sm);
    color: var(--text-secondary);
  }
  .feature-main .stats strong {
    color: var(--brand);
    font-weight: 600;
  }

  .feature-main .arrow {
    width: 20px;
    height: 20px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Aux Feature Card (Right, smaller) */
  .feature-aux {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: var(--sp-5) var(--sp-4);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: transform 0.15s ease;
  }
  .feature-aux:active { transform: scale(0.96); }

  .feature-aux .icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: var(--sp-2);
  }
  .feature-aux .icon svg { width: 22px; height: 22px; }

  .feature-aux .title {
    font-size: var(--text-base);
    font-weight: 600;
    margin-bottom: 2px;
  }
  .feature-aux .hint {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Icon Colors */
  .icon-blue { background: var(--blue-bg); }
  .icon-blue svg { color: var(--blue); }
  .icon-orange { background: var(--orange-bg); }
  .icon-orange svg { color: var(--orange); }
  .icon-green { background: var(--green-bg); }
  .icon-green svg { color: var(--brand); }
  .icon-pink { background: var(--pink-bg); }
  .icon-pink svg { color: var(--pink); }
  .icon-gray { background: var(--gray-bg); }
  .icon-gray svg { color: var(--gray); }

  /* Settings */
  .settings-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    margin-top: var(--sp-2);
  }
  .settings-item {
    display: flex;
    align-items: center;
    padding: var(--sp-4);
    cursor: pointer;
  }
  .settings-item:active { opacity: 0.9; }
  .settings-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--gray-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: var(--sp-3);
  }
  .settings-icon svg { width: 18px; height: 18px; color: var(--gray); }
  .settings-label { flex: 1; font-size: var(--text-base); font-weight: 500; }
  .settings-arrow { width: 18px; height: 18px; color: var(--text-muted); }

  /* =============================================
     悬浮岛底部Tab栏
     ============================================= */
  .floating-tab-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 390px;
    height: 68px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    padding: 0 6px;
    z-index: 9999;
    border-top: 0.5px solid rgba(255,255,255,0.6);
  }

  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    height: 56px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-item:active { transform: scale(0.93); }

  .tab-item svg {
    width: 23px;
    height: 23px;
    transition: all 0.2s;
  }

  .tab-item .tab-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2px;
    transition: all 0.2s;
  }

  .tab-item.inactive svg { color: var(--text-muted); }
  .tab-item.inactive .tab-label { color: var(--text-muted); }

  .tab-item.active svg { color: var(--brand); }
  .tab-item.active .tab-label { color: var(--brand); font-weight: 600; }

  .tab-item.active::before {
    content: '';
    position: absolute;
    inset: 4px 10px;
    background: rgba(45,200,156,0.12);
    border-radius: 16px;
    z-index: -1;
  }

  .tab-item.center-tab { position: relative; }

  .tab-item.center-tab .icon-wrap {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(45,200,156,0.45);
    margin-top: -10px;
    transition: all 0.2s;
  }

  .tab-item.center-tab .icon-wrap svg { color: white; width: 22px; height: 22px; }

  .tab-item.center-tab.active::before { display: none; }
  .tab-item.center-tab.active .icon-wrap {
    box-shadow: 0 6px 20px rgba(45,200,156,0.55);
    transform: scale(1.08);
  }

  .tab-item.center-tab .tab-label {
    color: var(--brand);
    font-weight: 600;
    margin-top: 2px;
    font-size: 10px;
  }

  @media (prefers-color-scheme: dark) {
    .floating-tab-bar {
      background: rgba(44,44,46,0.88);
      border-top-color: rgba(255,255,255,0.1);
    }
  }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .floating-tab-bar { bottom: calc(20px + env(safe-area-inset-bottom)); }
    .content { padding-bottom: calc(120px + env(safe-area-inset-bottom)); }
  }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-time">9:41</div>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- User Card -->
      <div class="user-card" onclick="goToUserDetail()">
        <div class="user-avatar">
          <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix&backgroundColor=c0aede" alt="头像">
        </div>
        <div class="user-info">
          <div class="user-name">张老师</div>
          <div class="user-meta">
            <span class="user-role">老师</span>
            <span class="user-id">ID: 12345678</span>
          </div>
        </div>
        <svg class="user-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>

      <!-- Row 1: 知识库 + 发知识点 -->
      <div class="feature-row">
        <div class="feature-main" onclick="goToKnowledge()">
          <div class="icon icon-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="info">
            <div class="title">知识库</div>
            <div class="stats">创建 <strong>12</strong> · 讲解 <strong>8</strong></div>
          </div>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
        <div class="feature-aux" onclick="goToPublishKnowledge()">
          <div class="icon icon-orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </div>
          <div class="title">发知识点</div>
          <div class="hint">分享见解</div>
        </div>
      </div>

      <!-- Row 2: 习题库 + 发习题 -->
      <div class="feature-row">
        <div class="feature-main" onclick="goToExercise()">
          <div class="icon icon-green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <div class="info">
            <div class="title">习题库</div>
            <div class="stats">创建 <strong>36</strong> · 讲解 <strong>15</strong></div>
          </div>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
        <div class="feature-aux" onclick="goToPublishExercise()">
          <div class="icon icon-pink">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v8M8 12h8"/>
            </svg>
          </div>
          <div class="title">发习题</div>
          <div class="hint">分享题目</div>
        </div>
      </div>

      <!-- Settings -->
      <div class="settings-card">
        <div class="settings-item" onclick="goToSettings()">
          <div class="settings-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </div>
          <span class="settings-label">设置</span>
          <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </div>

    </div>

    <!-- =============================================
         悬浮岛底部 Tab 栏
         ============================================= -->
    <nav class="floating-tab-bar">

      <!-- 教学 -->
      <div class="tab-item inactive" id="tab-teach" onclick="switchTab('teach')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="tab-label">教学</span>
      </div>

      <!-- 班级 -->
      <div class="tab-item inactive" id="tab-class" onclick="switchTab('class')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="tab-label">班级</span>
      </div>

      <!-- 任务(中间凸起按钮) -->
      <div class="tab-item inactive center-tab" id="tab-task" onclick="switchTab('task')">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 8 5 10 9 6"/><line x1="13" y1="8" x2="21" y2="8"/>
            <polyline points="3 16 5 18 9 14"/><line x1="13" y1="16" x2="19" y2="16"/>
          </svg>
        </div>
        <span class="tab-label">任务</span>
      </div>

      <!-- 收藏 -->
      <div class="tab-item inactive" id="tab-star" onclick="switchTab('star')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="tab-label">收藏</span>
      </div>

      <!-- 我的 -->
      <div class="tab-item active" id="tab-me" onclick="switchTab('me')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="tab-label">我的</span>
      </div>

    </nav>
  </div>

<script>
function goToUserDetail() { alert('用户详情页'); }
function goToKnowledge() { alert('知识库页'); }
function goToPublishKnowledge() { window.location.href = 'knowledge-publish.html'; }
function goToExercise() { alert('习题库页'); }
function goToPublishExercise() { window.location.href = 'exercise-publish.html'; }
function goToSettings() { alert('设置页'); }

// Tab 与页面映射
const tabPages = {
  'teach': 'teach.html',
  'class': 'class.html',
  'task': 'task.html',
  'star': 'favorite.html',
  'me': 'me.html'
};

function switchTab(name) {
  window.location.href = tabPages[name];
}
</script>
</body>
</html>
